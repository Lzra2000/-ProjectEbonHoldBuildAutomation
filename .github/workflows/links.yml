name: Link check

# Weekly external-link check across the docs and root documents.
# mkdocs build --strict validates internal links on every PR; this covers
# what it can't -- external targets (screenshot raw URLs, the server site,
# badges) rotting over time. On failure the lychee report lands in an
# issue titled "Link check report" (updated in place, not re-filed).

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # --accept 429: rate limits are not rot.
          # CurseForge sits behind Cloudflare and 403s bots -- excluded to
          # keep the weekly signal free of that known false positive.
          args: >-
            --no-progress
            --accept 200..206,429
            --exclude 'curseforge\.com'
            README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md
            'docs/**/*.md'
          output: ./lychee-report.md
          fail: true

      - name: File the report as an issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Link check report"
          EXISTING="$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number')"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file ./lychee-report.md
          else
            gh issue create --title "$TITLE" --label documentation --body-file ./lychee-report.md
          fi
